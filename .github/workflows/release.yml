name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: osm-tool
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
          - platform: macos-x64
            os: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build app
        run: uv run pyinstaller osm-tool.spec --noconfirm --clean

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $exe = Get-ChildItem -Path dist -Filter "${env:APP_NAME}.exe" -File | Select-Object -First 1
          if (-not $exe) {
            throw "Cannot find dist/${env:APP_NAME}.exe"
          }
          Copy-Item -LiteralPath $exe.FullName -Destination "release/${env:APP_NAME}-windows-x64.exe"
          Compress-Archive -Path "release/${env:APP_NAME}-windows-x64.exe" -DestinationPath "release/${env:APP_NAME}-windows-x64.zip" -Force

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          if [ -f "dist/${APP_NAME}" ]; then
            cp "dist/${APP_NAME}" "release/${APP_NAME}-macos-x64"
            chmod +x "release/${APP_NAME}-macos-x64"
            tar -czf "release/${APP_NAME}-macos-x64.tar.gz" -C release "${APP_NAME}-macos-x64"
          elif [ -d "dist/${APP_NAME}.app" ]; then
            ditto -c -k --keepParent "dist/${APP_NAME}.app" "release/${APP_NAME}-macos-x64-app.zip"
          else
            echo "dist contents:"
            find dist -maxdepth 2 -print
            exit 1
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: find release-assets -maxdepth 2 -type f -print

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-assets/* \
            --verify-tag \
            --title "$TAG_NAME" \
            --generate-notes
